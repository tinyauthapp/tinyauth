version: "2"
sql:
  - engine: "sqlite"
    queries: "sql/sqlite/*_queries.sql"
    schema: "sql/sqlite/*_schemas.sql"
    gen:
      go:
        package: "sqlite"
        out: "internal/repository/sqlite"
        rename:
          uuid: "UUID"
          oauth_groups: "OAuthGroups"
          oauth_name: "OAuthName"
          oauth_sub: "OAuthSub"
          redirect_uri: "RedirectURI"
        overrides:
          - column: "sessions.oauth_groups"
            go_type: "string"
          - column: "sessions.oauth_name"
            go_type: "string"
          - column: "sessions.oauth_sub"
            go_type: "string"
          - column: "sessions.ldap_groups"
            go_type: "string"
          - column: "oidc_codes.nonce"
            go_type: "string"
          - column: "oidc_tokens.nonce"
            go_type: "string"
          - column: "oidc_codes.code_challenge"
            go_type: "string"
